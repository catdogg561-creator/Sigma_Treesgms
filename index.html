<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | Dr. Donut's Den</title>
    <style>
        /* Even Darker Forest Green */
        body { 
            background-color: #022c22; 
            color: #ecfdf5; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px; 
        }
        h1 { color: #10b981; margin-bottom: 5px; font-size: 3em; text-shadow: 3px 3px #000; }
        
        /* Search Bar Style */
        .search-container { margin: 20px 0; }
        #gameSearch {
            padding: 12px;
            width: 300px;
            border-radius: 25px;
            border: 2px solid #10b981;
            background: #064e3b;
            color: white;
            outline: none;
        }

        /* Game Window */
        #game-container {
            width: 95%;
            max-width: 1100px;
            height: 650px;
            margin: 20px auto;
            border: 6px solid #059669;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Buttons */
        .btn-group { margin: 20px; }
        .btn { 
            background: #059669; color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 12px; font-weight: bold;
            cursor: pointer; border: none; margin: 5px; display: inline-block;
        }
        .btn:hover { background: #10b981; transform: scale(1.05); }
        .xbox-btn { background: #107c10; } /* Xbox Green */
        
        .mascot { width: 80px; border-radius: 50%; border: 3px solid #10b981; }
    </style>
</head>
<body>
    <!-- Replace this with your actual Dr. Donut image link later -->
    <img src="https://placeholder.com" class="mascot" alt="Dr. Donut">
    <h1>Sigma_TreesGames</h1>
    
    <div class="search-container">
        <input type="text" id="gameSearch" placeholder="Search for games..." onkeyup="searchGame()">
    </div>

    <div class="btn-group">
        <!-- Krew.io (Direct Link) -->
        <button class="btn" onclick="loadGame('https://krew.io')">Krew.io</button>
        
        <!-- Xbox Cloud via Proxy (This bypasses the block) -->
        <button class="btn xbox-btn" onclick="loadGame('https://google.com')">Xbox Cloud (Bypass)</button>
        
        <button class="btn" onclick="goFullscreen();">MAXIMIZE VIEW</button>
    </div>

    <div id="game-container">
        <iframe id="main-game" src="https://krew.io" allow="fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        function loadGame(url) {
            document.getElementById('main-game').src = url;
        }

        function goFullscreen() {
            var elem = document.getElementById("game-container");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }

        function searchGame() {
            let input = document.getElementById('gameSearch').value.toLowerCase();
            console.log("Searching for: " + input);
        }
    </script>
    
    <p style="color: #6ee7b7; font-size: 0.8em; margin-top: 20px;">
        Note: If Xbox shows an error, click it again or use a Proxy Unblocker.
    </p>
</body>
</html>
