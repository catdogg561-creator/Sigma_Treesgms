<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | Dr. Donut's Den</title>
    <script type="module" src="https://unpkg.com"></script>
    <style>
        body { background-color: #022c22; color: #ecfdf5; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; position: relative; min-height: 100vh; }
        
        /* Black Header */
        .header-bar { background-color: #000; padding: 15px; border-bottom: 3px solid #10b981; }
        h1 { color: #10b981; margin: 0; font-size: 2.2em; text-shadow: 2px 2px #000; }
        
        .warning-msg { background: #7f1d1d; color: #fecaca; padding: 8px; font-size: 0.85em; font-weight: bold; border-bottom: 2px solid #b91c1c; }

        /* Category Menu */
        .category-menu { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #064e3b; }
        .cat-btn { 
            background: #10b981; color: #000; padding: 12px 25px; border-radius: 30px; 
            font-weight: bold; cursor: pointer; border: 3px solid #059669; font-size: 1em; transition: 0.3s;
        }
        .cat-btn:hover { background: #000; color: #10b981; transform: translateY(-3px); }

        /* Game Galleries (Hidden by default) */
        .gallery { display: none; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 20px; }
        .active-gallery { display: flex; }

        .game-card { 
            width: 90px; cursor: pointer; transition: 0.3s; border-radius: 12px; 
            padding: 10px; background: rgba(0,0,0,0.4); border: 2px solid transparent; 
        }
        .game-card:hover { transform: scale(1.1); border-color: #10b981; background: #000; }
        .game-icon { font-size: 40px; margin-bottom: 5px; display: block; }
        .game-card span { font-size: 0.7em; font-weight: bold; display: block; }

        /* Game Box */
        #game-container { width: 80%; max-width: 750px; height: 420px; margin: 20px auto; border: 5px solid #059669; border-radius: 15px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .game-controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; padding-bottom: 60px; }
        .btn-action { background: #059669; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-tab { background: #1e40af; }
        
        .version-tag { position: fixed; bottom: 10px; right: 15px; color: #059669; font-size: 0.7em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Sigma_TreesGames</h1>
    </div>

    <div class="warning-msg">
        ⚠️ U might have to click on a game 1-3 times for it to work!
    </div>

    <!-- Main Category Selection -->
    <div class="category-menu">
        <div class="cat-btn" onclick="showCategory('shooters')">🔫 SHOOTERS</div>
        <div class="cat-btn" onclick="showCategory('chill')">🌊 CHILL</div>
        <div class="cat-btn" onclick="showCategory('snakey')">🐍 SNAKEY</div>
    </div>

    <!-- Shooters Gallery -->
    <div id="shooters" class="gallery">
        <div class="game-card" onclick="changeGame('https://shellshock.io', 'Shell Shockers')">
            <span class="game-icon">🥚</span><span>Shell Shockers</span>
        </div>
        <div class="game-card" onclick="changeGame('https://craftnite.io', 'Craftnite')">
            <span class="game-icon">⛏️</span><span>Craftnite.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://krunker.io', 'Krunker')">
            <span class="game-icon">🎯</span><span>Krunker.io</span>
        </div>
    </div>

    <!-- Chill Gallery -->
    <div id="chill" class="gallery active-gallery">
        <div class="game-card" onclick="changeGame('https://krew.io', 'Krew.io')">
            <span class="game-icon">⛵</span><span>Krew.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://dashmetry.com', 'Dashmentry')">
            <span class="game-icon">🏃</span><span>Dashmentry</span>
        </div>
        <div class="game-card" onclick="changeGame('https://bloxd.io', 'Bloxd.io')">
            <span class="game-icon">🧱</span><span>Bloxd.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://github.io', 'Tiny Fishing')">
            <span class="game-icon">🎣</span><span>Tiny Fishing</span>
        </div>
        <div class="game-card" onclick="changeGame('https://github.io', 'Red Ball')">
            <span class="game-icon">🔴</span><span>Red Ball</span>
        </div>
    </div>

    <!-- Snakey Gallery -->
    <div id="snakey" class="gallery">
        <div class="game-card" onclick="changeGame('https://littlebigsnake.com', 'Little Big Snake')">
            <span class="game-icon">🐍</span><span>Big Snake</span>
        </div>
        <div class="game-card" onclick="changeGame('https://wormszone.io', 'WormZone')">
            <span class="game-icon">🪱</span><span>WormZone.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://flyordie.io', 'FlyOrDie')">
            <span class="game-icon">🪰</span><span>FlyOrDie.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://mope.io', 'Mope.io')">
            <span class="game-icon">🐷</span><span>Mope.io</span>
        </div>
    </div>

    <h3 id="current-title" style="color:#10b981; margin-top:10px;">Select a Category Above</h3>

    <div id="game-container">
        <iframe id="main-game" is="x-frame-bypass" src="about:blank" allow="fullscreen" allowfullscreen></iframe>
    </div>

    <div class="game-controls">
        <button class="btn-action" onclick="goFullscreen();">FULLSCREEN</button>
        <button class="btn-action btn-tab" onclick="launchNewTab();">OPEN IN NEW TAB</button>
    </div>

    <div class="version-tag">v1.0.9</div>

    <script>
        function showCategory(catId) {
            // Hide all galleries
            document.querySelectorAll('.gallery').forEach(el => el.classList.remove('active-gallery'));
            // Show the selected one
            document.getElementById(catId).classList.add('active-gallery');
            document.getElementById('current-title').innerText = "Pick a " + catId + " game!";
        }

        function changeGame(url, name) {
            document.getElementById('main-game').src = url;
            document.getElementById('current-title').innerText = "Playing: " + name;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function launchNewTab() {
            var url = document.getElementById('main-game').src;
            if(url !== "about:blank") window.open(url, '_blank');
        }

        function goFullscreen() {
            var elem = document.getElementById("game-container");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }
    </script>
</body>
</html>
