<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | Dr. Donut's Den</title>
    <style>
        body { background-color: #022c22; color: #ecfdf5; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        
        /* Black Header */
        .header-bar { 
            background-color: #000; 
            padding: 15px; 
            border-bottom: 3px solid #10b981; 
            margin-bottom: 20px;
        }
        h1 { color: #10b981; margin: 0; font-size: 2.2em; text-shadow: 2px 2px #000; }
        
        /* Search Bar */
        #gameSearch {
            padding: 8px; width: 220px; border-radius: 15px; margin-top: 10px;
            border: 2px solid #10b981; background: #064e3b; color: white; outline: none;
        }

        /* Game Selection Row */
        .game-selection { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 10px; padding: 15px; background: #064e3b; 
        }
        .btn-game { 
            background: #059669; color: white; padding: 8px 15px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; border: none; 
            font-size: 0.85em; transition: 0.2s;
        }
        .btn-game:hover { background: #10b981; transform: scale(1.05); }

        /* Shrunk Game Box */
        #game-container {
            width: 75%; max-width: 700px; height: 400px; 
            margin: 20px auto; border: 4px solid #059669; 
            border-radius: 12px; overflow: hidden; background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Controls at Bottom */
        .game-controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; padding-bottom: 40px; }
        .btn-action { 
            background: #059669; color: white; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; border: none; 
        }
        .btn-tab { background: #1e40af; }
    </style>
</head>
<body>

    <div class="header-bar">
        <img src="https://placeholder.com" style="border-radius:50%; border:2px solid #10b981; margin-bottom:5px;">
        <h1>Sigma_TreesGames</h1>
        <input type="text" id="gameSearch" placeholder="Search games...">
    </div>

    <div class="game-selection">
        <button class="btn-game" onclick="changeGame('https://krew.io', 'Krew.io')">Krew.io</button>
        <button class="btn-game" onclick="changeGame('https://dashmetry.com', 'Dashmentry')">Dashmentry</button>
        <button class="btn-game" onclick="changeGame('https://geometrylitepc.io', 'GD Lite')">GD Lite</button>
        <button class="btn-game" onclick="changeGame('https://littlebigsnake.com', 'Snake')">Snake</button>
        <button class="btn-game" onclick="changeGame('https://y8.com/embed/slope', 'Slope')">Slope</button>
        <button class="btn-game" onclick="changeGame('https://fnaf1.io/', 'FNAF')">FNAF</button>
        <button class="btn-game" onclick="changeGame('https://shellshock.io', 'Shell')">Shell Shockers</button>
    </div>

    <h3 id="current-title" style="color:#10b981; margin-top:20px;">Click a game to start</h3>

    <div id="game-container">
        <iframe id="main-game" src="about:blank" allow="fullscreen" allowfullscreen></iframe>
    </div>

    <div class="game-controls">
        <button class="btn-action" onclick="goFullscreen();">FULLSCREEN</button>
        <button class="btn-action btn-tab" onclick="launchNewTab();">OPEN IN NEW TAB</button>
    </div>

    <script>
        function changeGame(url, name) {
            document.getElementById('main-game').src = url;
            document.getElementById('current-title').innerText = "Playing: " + name;
        }
        function launchNewTab() {
            var url = document.getElementById('main-game').src;
            if(url !== "about:blank") window.open(url, '_blank');
        }
        function goFullscreen() {
            var elem = document.getElementById("game-container");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }
    </script>
</body>
</html>
