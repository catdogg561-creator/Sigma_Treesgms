<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | HQ</title>
    <style>
        body { background-color: #022c22; color: #ecfdf5; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        
        /* Black Header */
        .header-bar { background-color: #000; padding: 15px; border-bottom: 3px solid #10b981; }
        h1 { color: #10b981; margin: 0; font-size: 2em; }
        
        /* Game Selection Gallery */
        .gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; 
            background: #064e3b; margin-bottom: 20px;
        }
        .game-card { 
            width: 120px; cursor: pointer; transition: 0.3s; 
            border: 2px solid transparent; border-radius: 10px; padding: 5px;
        }
        .game-card:hover { border-color: #10b981; transform: scale(1.1); background: #022c22; }
        .game-card img { width: 100%; border-radius: 8px; margin-bottom: 5px; }
        .game-card span { font-size: 0.8em; font-weight: bold; display: block; }

        /* Smaller Game Window */
        #game-container {
            width: 80%; max-width: 800px; height: 450px; 
            margin: 0 auto; border: 5px solid #059669; border-radius: 15px;
            overflow: hidden; background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Controls Under Game */
        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; padding-bottom: 50px; }
        .btn { 
            background: #059669; color: white; padding: 10px 20px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; border: none;
        }
        .btn-blue { background: #1e40af; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Sigma_TreesGames</h1>
        <input type="text" placeholder="Search games..." style="margin-top:10px; padding:5px; border-radius:15px; border:none;">
    </div>

    <div class="gallery">
        <!-- Game Cards -->
        <div class="game-card" onclick="changeGame('https://krew.io', 'Krew.io')">
            <img src="https://placeholder.com" alt="Krew">
            <span>Krew.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://dashmetry.com/', 'Dashmentry')">
            <img src="https://placeholder.com" alt="Dash">
            <span>Dashmentry</span>
        </div>
        <div class="game-card" onclick="changeGame('https://gamedistribution.com/games/geometry-lite/', 'GD Lite')">
            <img src="https://placeholder.com' alt="GD">
            <span>GD Lite</span>
        </div>
        <div class="game-card" onclick="changeGame('https://littlebigsnake.com/', 'Snake')">
            <img src="https://placeholder.com" alt="Snake">
            <span>Little Big Snake</span>
        </div>
        <div class="game-card" onclick="changeGame('https://github.io', 'Slope')">
            <img src="https://placeholder.com" alt="Slope">
            <span>Slope</span>
        </div>
        <div class="game-card" onclick="changeGame('https://github.io', 'FNAF')">
            <img src="https://placeholder.com" alt="FNAF">
            <span>FNAF</span>
        </div>
        <div class="game-card" onclick="changeGame('https://noob.io', 'Noob.io')">
            <img src="https://placeholder.com" alt="Noob">
            <span>Noob.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://shellshock.io', 'Shell')">
            <img src="https://placeholder.com" alt="Shell">
            <span>Shell Shockers</span>
        </div>
    </div>

    <h2 id="current-title" style="color:#10b981;">Playing: Krew.io</h2>
    
    <div id="game-container">
        <iframe id="main-game" src="https://krew.io" allow="fullscreen" allowfullscreen></iframe>
    </div>

    <div class="controls">
        <button class="btn" onclick="goFullscreen();">FULLSCREEN</button>
        <button class="btn btn-blue" onclick="window.open(document.getElementById('main-game').src, '_blank')">OPEN IN NEW TAB</button>
    </div>

    <script>
        function changeGame(url, name) {
            document.getElementById('main-game').src = url;
            document.getElementById('current-title').innerText = "Playing: " + name;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        function goFullscreen() {
            var elem = document.getElementById("game-container");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }
    </script>
</body>
</html>
